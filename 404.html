<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Golden Yarn Studio LLC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #8B4513;
            --secondary-color: #D2691E;
            --accent-color: #F4A460;
            --text-dark: #333;
            --text-light: #666;
            --bg-light: #FFF8DC;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        }

        .error-container {
            text-align: center;
            color: white;
            padding: 60px 40px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            max-width: 600px;
            margin: 20px;
        }

        .error-code {
            font-size: 8rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .error-title {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .error-description {
            font-size: 1.2rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .btn-primary {
            background-color: white;
            color: var(--primary-color);
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background-color: var(--accent-color);
            color: white;
            transform: translateY(-2px);
        }

        .btn-outline-light {
            border-color: white;
            color: white;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            transition: all 0.3s;
        }

        .btn-outline-light:hover {
            background-color: white;
            color: var(--primary-color);
        }

        .error-icon {
            font-size: 4rem;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .error-code {
                font-size: 5rem;
            }
            
            .error-title {
                font-size: 2rem;
            }
            
            .error-description {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">
            <i class="fas fa-search"></i>
        </div>
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-description">
            Oops! The page you're looking for doesn't exist or has been moved. 
            But don't worry, we have plenty of beautiful sweaters waiting for you!
        </p>
        <div class="d-flex gap-3 justify-content-center flex-wrap">
            <a href="index.html" class="btn btn-primary">
                <i class="fas fa-home me-2"></i>Go Home
            </a>
            <a href="products.html" class="btn btn-outline-light">
                <i class="fas fa-shopping-bag me-2"></i>Shop Now
            </a>
        </div>
        
        <div class="mt-5">
            <p class="mb-2">Looking for something specific?</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="about.html" class="text-white text-decoration-none">About Us</a>
                <span class="text-white">•</span>
                <a href="contact.html" class="text-white text-decoration-none">Contact</a>
                <span class="text-white">•</span>
                <a href="products.html" class="text-white text-decoration-none">Products</a>
            </div>
        </div>
    </div>

    <script>
        // Auto redirect to home after 10 seconds
        setTimeout(function() {
            window.location.href = 'index.html';
        }, 10000);
    </script>
</body>
</html>
